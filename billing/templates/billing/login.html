<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — BillFlow GST</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: #0f172a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      background: #fff;
      border-radius: 16px;
      padding: 40px 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 25px 60px rgba(0,0,0,0.4);
    }
    .brand { font-size: 26px; font-weight: 800; color: #0f172a; }
    .brand span { color: #3b82f6; }
    .form-control {
      border-radius: 8px;
      padding: 10px 14px;
      border: 1.5px solid #e2e8f0;
      font-size: 14px;
    }
    .form-control:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59,130,246,0.12);
    }
    .btn-login {
      background: #3b82f6;
      border: none;
      border-radius: 8px;
      padding: 11px;
      font-weight: 700;
      font-size: 15px;
      width: 100%;
      color: #fff;
      transition: background 0.2s;
    }
    .btn-login:hover { background: #2563eb; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="brand mb-1"><span>Bill</span>Flow</div>
    <p class="text-muted mb-4" style="font-size:13px">GST Billing System &mdash; Sign in to continue</p>

    {% if form.errors %}
    <div class="alert alert-danger py-2 px-3" style="font-size:13px">
      Invalid username or password.
    </div>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label fw-semibold" style="font-size:13px">Username</label>
        <input type="text" name="username" class="form-control" autofocus>
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold" style="font-size:13px">Password</label>
        <input type="password" name="password" class="form-control">
      </div>
      <button type="submit" class="btn-login">Sign In →</button>
    </form>
  </div>
</body>
</html>
